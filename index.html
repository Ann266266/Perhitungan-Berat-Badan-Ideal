<!DOCTYPE html>
<html>
<head>
<title>Perhitungan Berat Badan Ideal</title>
</head>

<body>

<h1>Perhitungan Berat Badan Ideal</h1>

<P>Masukkan tinggi badan (cm):</p>
<input type="number" id="tinggi">

<button onclick="hitung()">Hitung</button>

<p id="hasil"></p>

<script>
function hitung() {
  let tinggi =
parseInt(document.getElementById("tinggi").value);
  
  let hasil1 = tinggi - 100;
  let hasil2 = hasil1 * 0.10;
  let beratideal = hasil1 - hasil2;

document.getElementById("hasil").innerHTML = "Berat Badan Ideal adalah: " + beratideal + "kg";
}
</script>

</body>
</html>
